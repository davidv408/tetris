<div class="app">
    <app-board *ngIf="renderBoard" [(linesCleared)]="linesCleared" (gameOverChange)="onGameOver()"></app-board>
    <app-score *ngIf="renderBoard" [linesCleared]="linesCleared"></app-score>
    <app-game-over-modal *ngIf="gameIsOver" (restartGameChange)="onRestartGame()"></app-game-over-modal>
</div>
