<div *ngIf="board && activeShape" class="board" appUserMechanics [board]="board" [activeShape]="activeShape">
    @for (row of board; track $index) {
        <div class="row">
            @for (cell of row; track cell.id) {
                <div class="cell" [style.backgroundColor]="cell.color">
                </div>
            }
        </div>
    }
</div>
